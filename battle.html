<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle | QuestAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="qa_client.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#ffd700;--red:#ff4757;--green:#2ed573;--blue:#1e90ff;
  --cyan:#00fff7;--purple:#a855f7;--white:#f0f0f0;--fusion:#ff00ff;
  --energy:#f59e0b;
}
html,body{height:100%;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#f0f0f0;background:#000;}

/* ── SCENE ── */
#battle-bg{
  position:fixed;inset:0;z-index:0;
  transition:background 1.2s;
}
#ground-plane{
  position:fixed;bottom:0;left:0;right:0;height:32%;z-index:1;
  transition:background 1.2s,border-color 1.2s;
  border-top:3px solid rgba(100,200,80,.3);
}

/* ── 3D CANVASES ── */
.fighter-canvas{
  display:block;
  image-rendering:auto;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.8));
}
#player-canvas-wrap{
  position:fixed;left:90px;bottom:calc(32% + 20px);z-index:10;
}
#enemy-canvases{
  position:fixed;right:60px;bottom:calc(32% + 10px);
  display:flex;gap:20px;align-items:flex-end;z-index:10;
}
.enemy-canvas-wrap{
  display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;
}

/* HP bars */
.fighter-hp{display:flex;flex-direction:column;align-items:center;gap:2px;}
.fname{font-family:'Press Start 2P',monospace;font-size:6px;color:#fff;text-shadow:1px 1px 0 #000;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hp-out{width:80px;height:8px;background:#111;border:2px solid #333;border-radius:2px;overflow:hidden;}
.hp-in{height:100%;border-radius:1px;transition:width .4s,background .3s;}
.hp-txt{font-family:'Press Start 2P',monospace;font-size:6px;color:#aaa;text-shadow:1px 1px 0 #000;}

/* Player HP - fixed top-left */
#player-hud{
  position:fixed;top:14px;left:14px;z-index:30;
  background:rgba(0,0,0,.75);border:2px solid #2a2a4a;border-radius:4px;
  padding:8px 12px;min-width:160px;
}
.p-hud-name{font-family:'Press Start 2P',monospace;font-size:8px;color:#fff;margin-bottom:5px;}
.p-hud-hp-out{width:140px;height:10px;background:#111;border:2px solid #333;border-radius:2px;overflow:hidden;}
.p-hud-hp-in{height:100%;transition:width .4s,background .3s;}
.p-hud-hp-txt{font-family:'Press Start 2P',monospace;font-size:7px;color:#aaa;margin-top:3px;}

/* ── TOP HUD ── */
#top-hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;align-items:center;gap:6px;}
.turn-banner{font-family:'Press Start 2P',monospace;font-size:9px;background:rgba(0,0,0,.8);border:2px solid var(--gold);padding:6px 16px;border-radius:3px;color:var(--gold);}
#turn-log{width:200px;max-height:100px;overflow:hidden;}
.log-line{font-family:'Press Start 2P',monospace;font-size:6px;color:#aaa;line-height:1.9;text-shadow:1px 1px 0 #000;}
.log-line.pa{color:#88aaff;}.log-line.ea{color:#ff7777;}.log-line.sy{color:var(--gold);}

/* ── FLEE ── */
#flee-btn{position:fixed;top:14px;right:14px;z-index:30;font-family:'Press Start 2P',monospace;font-size:7px;background:rgba(0,0,0,.8);border:2px solid #555;padding:7px 12px;border-radius:3px;color:#777;cursor:pointer;transition:all .2s;}
#flee-btn:hover{border-color:var(--red);color:var(--red);}

/* ── ENERGY / ATK ── */
#energy-row{position:fixed;left:18px;bottom:calc(32% + 250px);z-index:30;}
.energy-label{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--energy);margin-bottom:4px;}
.ep-row{display:flex;gap:5px;}
.ep{width:20px;height:20px;border-radius:3px;border:2px solid #444;background:#111;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:10px;}
.ep.on{background:var(--energy);border-color:#ffa500;box-shadow:0 0 7px rgba(245,158,11,.6);}
.ep.on::after{content:'⚡';}
#atk-row{position:fixed;right:18px;bottom:calc(32% + 250px);z-index:30;text-align:right;}
.atk-label{font-family:'Press Start 2P',monospace;font-size:6px;color:#777;margin-bottom:4px;}
.ap{display:inline-block;width:13px;height:13px;border-radius:2px;border:2px solid #333;background:#111;margin-left:3px;transition:all .2s;}
.ap.on{background:var(--cyan);border-color:#00cccc;box-shadow:0 0 5px rgba(0,255,247,.4);}

/* ── FUSION METER ── */
#fusion-meter{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(32% + 252px);
  z-index:30;text-align:center;display:none;
  background:rgba(0,0,0,.7);border:2px solid #440044;border-radius:4px;padding:5px 14px;
}
.fm-label{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--fusion);animation:fmPulse 1s ease-in-out infinite alternate;}
@keyframes fmPulse{from{opacity:.6;}to{opacity:1;text-shadow:0 0 8px #ff00ff;}}
.fp-row{display:flex;gap:5px;justify-content:center;margin:4px 0;}
.fp{width:15px;height:15px;border-radius:50%;border:2px solid #330033;background:#0a0010;transition:all .3s;}
.fp.on{background:linear-gradient(135deg,#ff00ff,#00ffff);border-color:#ff00ff;box-shadow:0 0 10px #ff00ff;}
#fm-turns{font-family:'Press Start 2P',monospace;font-size:5px;color:#664466;}
#fm-ready{font-family:'Press Start 2P',monospace;font-size:7px;color:#ff00ff;animation:fmPulse .5s ease-in-out infinite alternate;display:none;}

/* ── ACTION MENU ── */
#action-menu{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:700px;max-width:97vw;z-index:25;
}
.menu-tabs{display:flex;gap:3px;}
.menu-tab{font-family:'Press Start 2P',monospace;font-size:7px;padding:6px 14px;background:rgba(0,0,0,.8);border:2px solid #1e2030;border-bottom:none;border-radius:4px 4px 0 0;color:#555;cursor:pointer;transition:all .15s;}
.menu-tab:hover{color:#999;}.menu-tab.active{background:rgba(4,8,18,.97);border-color:#2a2a4a;color:#fff;}
.menu-panel{background:rgba(4,8,18,.97);border:2px solid #1e2030;border-top:2px solid #2a2a4a;border-radius:0 4px 0 0;padding:10px;min-height:88px;}
.move-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.mb{display:flex;align-items:center;gap:9px;padding:7px 10px;background:rgba(255,255,255,.03);border:2px solid #1a2030;border-radius:3px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.mb:hover:not(.dis){background:rgba(255,255,255,.07);border-color:#303a5a;transform:translateY(-1px);}
.mb.dis{opacity:.35;cursor:not-allowed;}
.mb.ocd{opacity:.5;cursor:not-allowed;}
.mb.fuse{border-color:#550055!important;background:rgba(255,0,255,.05);}
.mb.fuse:hover:not(.dis){background:rgba(255,0,255,.1);border-color:#ff00ff!important;}
.mbadge{position:absolute;top:2px;right:4px;font-family:'Press Start 2P',monospace;font-size:5px;background:#7c3aed;color:#fff;padding:1px 3px;border-radius:2px;}
.cdb{position:absolute;top:2px;right:4px;font-family:'Press Start 2P',monospace;font-size:5px;color:var(--red);}
.mi{font-size:20px;flex-shrink:0;}
.mn{font-family:'Press Start 2P',monospace;font-size:7px;color:#fff;margin-bottom:2px;}
.md{font-size:10px;color:#556;line-height:1.3;}
.mc{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--energy);flex-shrink:0;}
.mc.mm{color:var(--purple);}
.mc.mf{color:var(--fusion);}
.refill{border-color:var(--energy)!important;}

/* ── MATH PANEL ── */
#math-panel{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(4px);}
#math-panel.open{display:flex;}
.math-box{background:rgba(4,8,20,.99);border:3px solid var(--gold);border-radius:7px;padding:24px 32px;width:460px;max-width:93vw;text-align:center;box-shadow:0 0 40px rgba(255,215,0,.1);animation:mPop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes mPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.mp{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gold);margin-bottom:6px;line-height:1.7;}
.ms{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--fusion);margin-bottom:8px;min-height:14px;}
.msub{font-size:10px;color:#556;margin-bottom:10px;letter-spacing:.07em;}
.mq{font-family:'Press Start 2P',monospace;font-size:14px;color:#fff;margin-bottom:16px;background:rgba(255,255,255,.04);padding:12px;border-radius:4px;border:1px solid #1a2030;line-height:1.6;white-space:pre-line;}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.mc-btn{padding:11px;background:rgba(255,255,255,.04);border:2px solid #1a2030;border-radius:4px;font-family:'Press Start 2P',monospace;font-size:10px;color:#fff;cursor:pointer;transition:all .15s;}
.mc-btn:hover{background:rgba(255,255,255,.09);border-color:#3a3a5a;}
.mc-btn.right{background:rgba(34,197,94,.2);border-color:var(--green);color:var(--green);}
.mc-btn.wrong{background:rgba(239,68,68,.18);border-color:var(--red);color:var(--red);}
.mr{font-family:'Press Start 2P',monospace;font-size:8px;min-height:16px;line-height:1.6;}
.mr.ok{color:var(--green);}.mr.bad{color:var(--red);}

/* ── LOOT POPUP ── */
#loot-popup{position:fixed;top:18%;left:50%;transform:translateX(-50%);z-index:55;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
.loot-item{font-family:'Press Start 2P',monospace;font-size:8px;background:rgba(4,8,20,.96);border:2px solid var(--gold);padding:5px 14px;border-radius:3px;color:var(--gold);animation:lootF 2.4s ease-out forwards;white-space:nowrap;}
.loot-item.rare{border-color:#a855f7;color:#a855f7;}
@keyframes lootF{0%{opacity:0;transform:translateY(14px);}15%{opacity:1;transform:translateY(0);}80%{opacity:1;}100%{opacity:0;transform:translateY(-26px);}}

/* ── DAMAGE NUMBERS ── */
.dmg-num{position:fixed;pointer-events:none;z-index:40;font-family:'Press Start 2P',monospace;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000;animation:dmgF .9s ease-out forwards;}
@keyframes dmgF{0%{opacity:1;transform:translateY(0);}60%{opacity:1;transform:translateY(-36px);}100%{opacity:0;transform:translateY(-52px);}}

/* ── RESULT ── */
#result-screen{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.93);}
#result-screen.open{display:flex;}
.res-box{text-align:center;animation:resPop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes resPop{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
.res-title{font-family:'Press Start 2P',monospace;font-size:32px;margin-bottom:14px;text-shadow:3px 3px 0 #000;}
.res-title.win{color:var(--gold);}.res-title.lose{color:var(--red);}
.res-rewards{font-size:15px;color:#aaa;margin-bottom:22px;line-height:2.2;}
.res-rewards b{color:var(--gold);}
.res-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 22px;background:#060c1a;border:2px solid var(--gold);border-radius:3px;color:var(--gold);cursor:pointer;transition:all .2s;margin:0 5px;}
.res-btn:hover{background:rgba(255,215,0,.12);}

/* void rainbow */
#void-rainbow{position:fixed;inset:0;pointer-events:none;z-index:2;display:none;background:linear-gradient(45deg,rgba(255,0,0,.03),rgba(255,165,0,.03),rgba(255,255,0,.03),rgba(0,255,0,.03),rgba(0,0,255,.03),rgba(238,130,238,.03));animation:rbShift 3s linear infinite;opacity:0.2;}
@keyframes rbShift{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}
.vparticle{position:fixed;pointer-events:none;z-index:1;width:4px;height:4px;border-radius:50%;animation:vpF linear infinite;}
@keyframes vpF{0%{transform:translate(0,100vh);opacity:0;}10%{opacity:.7;}90%{opacity:.7;}100%{transform:translate(var(--dx),-60px);opacity:0;}}
</style>
</head>
<body>

<div id="battle-bg"></div>
<div id="ground-plane"></div>
<div id="void-rainbow"></div>

<!-- Player HUD -->
<div id="player-hud">
  <div class="p-hud-name" id="p-hud-name">HERO</div>
  <div class="p-hud-hp-out"><div class="p-hud-hp-in" id="p-hp-bar" style="width:100%;background:#22c55e;"></div></div>
  <div class="p-hud-hp-txt" id="p-hp-txt">20/20</div>
</div>

<!-- Turn banner + log -->
<div id="top-hud">
  <div class="turn-banner" id="turn-banner">YOUR TURN</div>
  <div id="turn-log"></div>
</div>

<button id="flee-btn" onclick="attemptFlee()">✕ FLEE</button>
<button onclick="openBattleChat()" style="position:fixed;top:14px;right:90px;z-index:30;font-family:'Press Start 2P',monospace;font-size:7px;background:rgba(0,0,0,.8);border:2px solid #446;padding:7px 12px;border-radius:3px;color:#88aaff;cursor:pointer;transition:all .2s;">💬 CHAT</button>

<!-- 3D Player canvas -->
<div id="player-canvas-wrap">
  <canvas id="player-canvas" class="fighter-canvas" width="130" height="170"></canvas>
</div>

<!-- 3D Enemy canvases -->
<div id="enemy-canvases"></div>

<!-- Energy + Atk -->
<div id="energy-row">
  <div class="energy-label">ENERGY</div>
  <div class="ep-row" id="epips"></div>
</div>
<div id="atk-row">
  <div class="atk-label">ATTACKS</div>
  <div id="apips"></div>
</div>

<!-- Fusion Meter -->
<div id="fusion-meter">
  <div class="fm-label">✦ FUSION CHARGE ✦</div>
  <div class="fp-row"><div class="fp" id="fp0"></div><div class="fp" id="fp1"></div><div class="fp" id="fp2"></div></div>
  <div id="fm-turns"></div>
  <div id="fm-ready">READY TO UNLEASH!</div>
</div>

<!-- Action Menu -->
<div id="action-menu">
  <div class="menu-tabs">
    <div class="menu-tab active" id="tab-moves" onclick="switchTab('moves')">MOVES</div>
    <div class="menu-tab" id="tab-info" onclick="switchTab('info')">INFO</div>
  </div>
  <div class="menu-panel"><div class="move-grid" id="move-grid"></div></div>
</div>

<!-- Loot popup -->
<div id="loot-popup"></div>

<!-- Math Panel -->
<div id="math-panel">
  <div class="math-box">
    <div class="mp" id="math-prompt">⚡ ANSWER TO RESTORE ENERGY!</div>
    <div class="ms" id="math-streak"></div>
    <div class="msub" id="math-subj">ALGEBRA</div>
    <div class="mq" id="math-q">...</div>
    <div class="mc-grid" id="math-choices"></div>
    <div class="mr" id="math-res"></div>
  </div>
</div>

<!-- Result -->
<div id="result-screen">
  <div class="res-box">
    <div class="res-title" id="res-title">VICTORY!</div>
    <div class="res-rewards" id="res-rewards"></div>
    <button class="res-btn" onclick="continueAfterBattle()">CONTINUE ▶</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════
function getUser(){
  // Prefer live QA session, fall back to localStorage
  if(window.QA && QA.session) return QA.session;
  const n=localStorage.getItem('qa_session');if(!n)return null;
  return(JSON.parse(localStorage.getItem('qa_users')||'{}'))[n]||null;
}
function saveUser(u){
  // Save to both QA and localStorage
  if(window.QA && QA.session){ QA.savePlayer({gold:u.gold,xp:u.xp,level:u.level,hp:u.hp}).catch(()=>{}); }
  const us=JSON.parse(localStorage.getItem('qa_users')||'{}');us[u.username]=u;localStorage.setItem('qa_users',JSON.stringify(us));
}
function rng(n){return Math.floor(Math.random()*(n+1));}

// ══════════════════════════════════════════════
//  3D MODEL BUILDER (Three.js)
// ══════════════════════════════════════════════
const THREE_SCENES = {}; // key -> {scene,camera,renderer,mixer,clock,model,anim}

function makeRenderer(canvas,w,h){
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setSize(w,h);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  return renderer;
}

function makeScene(){
  const scene=new THREE.Scene();
  const amb=new THREE.AmbientLight(0xffffff,0.6);scene.add(amb);
  const dir=new THREE.DirectionalLight(0xffffff,1.2);dir.position.set(3,6,4);dir.castShadow=true;scene.add(dir);
  const fill=new THREE.DirectionalLight(0x8888ff,0.4);fill.position.set(-4,2,-2);scene.add(fill);
  return scene;
}

function makeCamera(w,h){
  const cam=new THREE.PerspectiveCamera(35,w/h,0.1,100);
  cam.position.set(0,1.8,5.5);cam.lookAt(0,1,0);
  return cam;
}

// ── BUILD PLAYER MODEL ──
function buildPlayerModel(scene){
  const g=new THREE.Group();
  const M=THREE.MeshToonMaterial;
  const skin=new M({color:0xf5c27a});
  const blue=new M({color:0x2255bb});
  const darkBlue=new M({color:0x1a3a8a});
  const hair=new M({color:0x4a2a10});
  const silver=new M({color:0xb0b8c8});
  const eyeM=new M({color:0x222222});
  function box(w,h,d,mat,x,y,z){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z);m.castShadow=true;return m;
  }
  // Torso
  const torso=box(.6,.55,.35,blue,0,1,0);g.add(torso);
  // Chest plate
  const chest=box(.55,.3,.36,new M({color:0x3366cc}),0,1.08,0);g.add(chest);
  // Head
  const head=box(.44,.42,.38,skin,0,1.6,0);g.add(head);
  // Hair
  const hTop=box(.46,.14,.40,hair,0,1.82,0);g.add(hTop);
  // Eyes
  const el=box(.09,.1,.39,eyeM,-0.1,1.62,0.19);g.add(el);
  const er=box(.09,.1,.39,eyeM,0.1,1.62,0.19);g.add(er);
  // Arms
  const armL=box(.18,.5,.18,blue,-0.44,0.98,0);armL.name='armL';armL.rotation.z=0.1;g.add(armL);
  const armR=box(.18,.5,.18,blue, 0.44,0.98,0);armR.name='armR';armR.rotation.z=-0.1;g.add(armR);
  // Weapon (pencil on right arm)
  const wpn=box(.06,.7,.06,silver,0.44,0.75,0.18);wpn.name='weapon';g.add(wpn);
  const wpnTip=box(.06,.1,.06,new M({color:0xffcc44}),0.44,1.12,0.18);g.add(wpnTip);
  // Legs
  const legL=box(.22,.55,.22,darkBlue,-0.19,0.42,0);legL.name='legL';g.add(legL);
  const legR=box(.22,.55,.22,darkBlue, 0.19,0.42,0);legR.name='legR';g.add(legR);
  // Boots
  g.add(box(.24,.12,.28,new M({color:0x1a1a2a}),-0.19,0.16,0.04));
  g.add(box(.24,.12,.28,new M({color:0x1a1a2a}), 0.19,0.16,0.04));
  // Shadow circle
  const sh=new THREE.Mesh(new THREE.CircleGeometry(.38,24),new M({color:0x000000,transparent:true,opacity:.18}));
  sh.rotation.x=-Math.PI/2;sh.position.y=0.01;g.add(sh);
  scene.add(g);
  return {group:g, armL, armR, legL, legR, wpn};
}

// ── BUILD ENEMY MODEL ──
function buildEnemyModel(scene, cfg){
  const M=THREE.MeshToonMaterial;
  const g=new THREE.Group();
  function box(w,h,d,col,x,y,z){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new M({color:col}));
    m.position.set(x,y,z);m.castShadow=true;return m;
  }
  function sph(r,col,x,y,z){
    const m=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),new M({color:col}));
    m.position.set(x,y,z);m.castShadow=true;return m;
  }
  const t=cfg.modelType||'slime';
  let parts={};
  if(t==='slime'){
    const col=cfg.color||0x5de367,dark=darken(col,.6);
    const body=new THREE.Mesh(new THREE.SphereGeometry(.5,20,16),new M({color:col}));
    body.scale.set(1.2,.9,1.0);body.position.y=.55;body.castShadow=true;g.add(body);
    // Eyes
    const el=sph(.08,0xffffff,-.18,.66,.46);g.add(el);g.add(sph(.04,0x111111,-.18,.66,.52));

function darken(hex,f){const r=Math.floor(((hex>>16)&255)*f),g2=Math.floor(((hex>>8)&255)*f),b=Math.floor((hex&255)*f);return(r<<16)|(g2<<8)|b;}

// ── ANIMATE LOOP ──
function startLoop(key){
  const s=THREE_SCENES[key];if(!s)return;
  s.clock=new THREE.Clock();
  function loop(){
    s.raf=requestAnimationFrame(loop);
    const dt=s.clock.getDelta(),t=s.clock.getElapsedTime();
    tickAnim(s,t,dt);
    s.renderer.render(s.scene,s.camera);
  }
  loop();
}

function tickAnim(s,t,dt){
  const a=s.animState||'idle';
  const m=s.model;if(!m)return;
  const g=m.group;
  if(s.isPlayer){
    const al=g.getObjectByName('armL'),ar=g.getObjectByName('armR'),ll=g.getObjectByName('legL'),lr=g.getObjectByName('legR');
    if(a==='idle'){
      if(al)al.rotation.x=Math.sin(t*2)*.12;
      if(ar)ar.rotation.x=Math.cos(t*2)*.12;
      if(ll)ll.rotation.x=Math.sin(t*2)*.08;
      if(lr)lr.rotation.x=Math.cos(t*2)*.08;
      g.position.y=Math.sin(t*1.8)*.025;
    } else if(a==='attack'){
      s.at=(s.at||0)+dt*4;
      if(ar)ar.rotation.x=-Math.PI*.8*Math.sin(s.at*Math.PI);
      if(s.at>1){s.animState='idle';s.at=0;}
    } else if(a==='hurt'){
      g.rotation.z=Math.sin(t*18)*.06;
      g.position.y=Math.sin(t*1.8)*.025;
    } else if(a==='dead'){
      if(g.rotation.z<-Math.PI*.45)return;
      g.rotation.z-=dt*1.8;g.position.y=Math.max(-.2,g.position.y-dt*.6);
    } else if(a==='fusion'){
      g.rotation.y=Math.sin(t*3)*.2;
      g.position.y=Math.sin(t*4)*.05+.04;
    }
  } else {
    // enemy animations by type
    const et=s.enemyType||'slime';
    if(et==='slime'||et==='poop'){
      const body=g.children[0];
      if(a==='idle'){body.scale.y=.9+Math.sin(t*2)*.1;body.scale.x=1+Math.cos(t*2)*.05;body.position.y=.55+Math.sin(t*2)*.04;}
      else if(a==='attack'){s.at=(s.at||0)+dt*5;body.position.y=.55+Math.abs(Math.sin(s.at*Math.PI))*.4;if(s.at>1){s.animState='idle';s.at=0;}}
      else if(a==='dead'){g.scale.y=Math.max(0,g.scale.y-dt*2);g.scale.x=Math.min(2,g.scale.x+dt*1.5);}
    } else if(et==='lavaskull'||et==='dimwisp'){
      if(a==='idle'){g.position.y=Math.sin(t*2.2)*.08;g.rotation.y=Math.sin(t*1.4)*.15;}
      else if(a==='attack'){s.at=(s.at||0)+dt*4;g.position.z=Math.sin(s.at*Math.PI)*.3;if(s.at>1){s.animState='idle';s.at=0;}}
    } else if(et==='beyondfrag'){
      // spin nested cubes at different speeds
      for(let i=0;i<4;i++){const c=g.getObjectByName('cube'+i);if(c){c.rotation.x=t*(1+i*.5);c.rotation.y=t*(1.3+i*.4);}}
    } else if(et==='wanderer'){
      g.position.y=Math.sin(t*1.6)*.1;
      const el=g.getObjectByName('eyeL'),er=g.getObjectByName('eyeR');
      if(el)el.material.emissiveIntensity=.7+Math.sin(t*3)*.3;
      if(er)er.material.emissiveIntensity=.7+Math.cos(t*3)*.3;
      const al=g.getObjectByName('armL'),ar=g.getObjectByName('armR');
      if(al)al.rotation.z=.2+Math.sin(t*1.8)*.1;
      if(ar)ar.rotation.z=-.2+Math.cos(t*1.8)*.1;
    } else {
      // generic bob
      if(a==='idle')g.position.y=Math.sin(t*2)*.05;
      else if(a==='attack'){s.at=(s.at||0)+dt*4;g.position.z=Math.sin(s.at*Math.PI)*.25;if(s.at>1){s.animState='idle';s.at=0;}}
      else if(a==='dead'){g.rotation.z=(g.rotation.z||0)-dt*2;g.position.y=Math.max(-.3,g.position.y-dt*.5);}
    }
    if(a==='dead'&&et!=='slime'&&et!=='poop'){
      g.rotation.z=(g.rotation.z||0)-dt*1.8;g.position.y=Math.max(-.2,g.position.y-dt*.6);
    }
  }
}

function setAnim(key,state){const s=THREE_SCENES[key];if(s){s.animState=state;s.at=0;}}

let BS={player:null,enemies:[],energy:2,maxEnergy:2,attacksLeft:2,maxAttacks:2,turn:'player',
  equippedCards:[],masteries:[],cooldowns:{},blockNext:false,passives:{},
  isVoid:false,fusionTurns:0,fusionStreak:0,fusionReady:false,fusionUsed:false,
  mathMode:'energy',config:null};

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function initBattle(cfg){
  // Clean up old scenes
  Object.values(THREE_SCENES).forEach(s=>{if(s.raf)cancelAnimationFrame(s.raf);if(s.renderer)s.renderer.dispose();});
  Object.keys(THREE_SCENES).forEach(k=>delete THREE_SCENES[k]);

  BS.config=cfg;
  const u=getUser(),lvl=u?.level||1;
  BS.player={name:(u?.username||'HERO').toUpperCase().slice(0,8),hp:18+lvl*2,maxHp:18+lvl*2,statusEffects:[]};
  BS.enemies=cfg.enemies.map((e,i)=>({...e,id:i,hp:e.maxHp,statusEffects:[],alive:true}));
  const deck=u?.equippedCards||['pencil_stab','paper_throw','eraser_block','paper_rain'];
  BS.equippedCards=deck.map(id=>CARDS.find(c=>c.id===id)).filter(Boolean);
  BS.passives={};BS.equippedCards.filter(c=>c.type==='passive').forEach(c=>{if(c.passive)BS.passives[c.passive]=true;});
  const unlocked=u?.unlockedMasteries||[];
  BS.masteries=MASTERIES.filter(m=>unlocked.includes(m.world));
  BS.isVoid=!!cfg.isVoid;
  BS.fusionTurns=0;BS.fusionStreak=0;BS.fusionReady=false;BS.fusionUsed=false;
  BS.energy=BS.passives.energy_up?3:2;BS.maxEnergy=2;
  BS.attacksLeft=BS.maxAttacks=2;BS.cooldowns={};BS.blockNext=false;BS.turn='player';

  // Apply world bg
  document.getElementById('battle-bg').style.background=cfg.bg||'linear-gradient(180deg,#0d1b2a,#1a3a5c)';
  document.getElementById('ground-plane').style.background=cfg.gnd||'linear-gradient(180deg,#2a4020,#1a2a14)';
  document.getElementById('ground-plane').style.borderTopColor=cfg.gline||'rgba(100,200,80,.3)';

  if(BS.isVoid)initVoidFX();else{document.getElementById('void-rainbow').style.display='none';}

  // Build player 3D
  setTimeout(()=>{
    buildPlayer3D();
    buildEnemies3D();
  },60);

  document.getElementById('p-hud-name').textContent=BS.player.name;
  renderMoves();renderEnergy();renderAtk();updateHp();
  if(BS.isVoid)renderFusion();
  addLog('Battle begins!','sy');setTurBanner('YOUR TURN');
}

function buildPlayer3D(){
  const canvas=document.getElementById('player-canvas');
  const w=130,h=170;
  const scene=makeScene();const camera=makeCamera(w,h);const renderer=makeRenderer(canvas,w,h);
  const model=buildPlayerModel(scene);
  THREE_SCENES['player']={scene,camera,renderer,model,isPlayer:true,animState:'idle',at:0,clock:new THREE.Clock()};
  startLoop('player');
}

function buildEnemies3D(){
  const container=document.getElementById('enemy-canvases');container.innerHTML='';
  BS.enemies.forEach((en,i)=>{
    const sz=en.sz||1;
    const cw=Math.floor(100*sz),ch=Math.floor(130*sz);
    const wrap=document.createElement('div');wrap.className='enemy-canvas-wrap';wrap.id='ew'+i;
    const canvas=document.createElement('canvas');canvas.id='ec'+i;canvas.className='fighter-canvas';canvas.width=cw;canvas.height=ch;
    wrap.appendChild(canvas);
    const hpDiv=document.createElement('div');hpDiv.className='fighter-hp';
    hpDiv.innerHTML=`<div class="fname">${en.name.toUpperCase().slice(0,10)}</div><div class="hp-out"><div class="hp-in" id="ehb${i}" style="width:100%;background:#22c55e;"></div></div><div class="hp-txt" id="eht${i}">${en.hp}/${en.maxHp}</div>`;
    wrap.appendChild(hpDiv);
    container.appendChild(wrap);
    const scene=makeScene();const camera=makeCamera(cw,ch);camera.position.set(0,1.4,5);camera.lookAt(0,.9,0);
    const renderer=makeRenderer(canvas,cw,ch);
    const model=buildEnemyModel(scene,en);
    const key='enemy'+i;
    THREE_SCENES[key]={scene,camera,renderer,model,isPlayer:false,enemyType:en.modelType||'slime',animState:'idle',at:0,clock:new THREE.Clock()};
    if(sz>1)model.group.scale.setScalar(sz);
    startLoop(key);
  });
}

function initVoidFX(){
  document.getElementById('void-rainbow').style.display='block';
  document.getElementById('fusion-meter').style.display='flex';
  const colors=['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#ff00ff','#00ffff'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div');p.className='vparticle';
    p.style.cssText=`background:${colors[i%colors.length]};left:${Math.random()*100}%;--dx:${(Math.random()-.5)*260}px;animation-duration:${2.5+Math.random()*5}s;animation-delay:${Math.random()*5}s;`;
    document.getElementById('battle-bg').appendChild(p);
  }
}

function renderMoves(){
  const grid=document.getElementById('move-grid');
  const active=BS.equippedCards.filter(c=>c.type!=='passive');
  const items=[...active,...BS.masteries];
  let html=items.map(card=>{
    const cd=BS.cooldowns[card.id]||0,isM=card.type==='mastery';
    const canUse=BS.turn==='player'&&BS.energy>=card.energy&&BS.attacksLeft>0&&cd===0;
    return `<div class="mb ${!canUse?'dis':''} ${cd>0?'ocd':''}" onclick="useMove('${card.id}')">
      ${isM?'<div class="mbadge">MST</div>':''}${cd>0?`<div class="cdb">CD:${cd}</div>`:''}
      <div class="mi">${card.emoji}</div>
      <div style="flex:1"><div class="mn">${card.name}</div><div class="md">${cd>0?'Cooldown: '+cd:card.desc}</div></div>
      <div class="mc ${isM?'mm':''}">${'⚡'.repeat(card.energy)||'—'}</div></div>`;
  }).join('');
  if(BS.isVoid&&!BS.fusionUsed){
    const locked=BS.fusionTurns<3,canFuse=!locked&&BS.fusionReady&&BS.turn==='player'&&BS.attacksLeft>0;
    html+=`<div class="mb fuse ${!canFuse?'dis':''}" style="grid-column:span 2;" onclick="${canFuse?'startFusion()':''}">
      <div class="mi">✦</div>
      <div style="flex:1"><div class="mn" style="color:#ff00ff">ELEMENTAL FUSION</div>
      <div class="md">${locked?'Wait '+(3-BS.fusionTurns)+' more turns...':BS.fusionReady?'READY — 3 correct answers!':'Get 3 correct to activate'}</div></div>
      <div class="mc mf">✦✦✦</div></div>`;
  }
  if(BS.energy===0&&BS.attacksLeft>0&&BS.turn==='player')
    html+=`<div class="mb refill" style="grid-column:span 2;" onclick="triggerMath('energy')">
      <div class="mi">❓</div><div style="flex:1"><div class="mn" style="color:#f59e0b">ANSWER QUESTION</div><div class="md">Answer correctly to restore 2 energy</div></div>
      <div class="mc">⚡⚡</div></div>`;
  else if(BS.energy>0&&BS.energy<2&&BS.attacksLeft>0&&BS.turn==='player'&&active.every(c=>c.energy>BS.energy))
    html+=`<div class="mb refill" style="grid-column:span 2;" onclick="triggerMath('energy')">
      <div class="mi">❓</div><div style="flex:1"><div class="mn" style="color:#f59e0b">ANSWER QUESTION</div><div class="md">Not enough energy — restore to full</div></div>
      <div class="mc">⚡⚡</div></div>`;
  grid.innerHTML=html;
}
function renderEnergy(){
  const c=document.getElementById('epips');c.innerHTML='';
  for(let i=0;i<Math.max(BS.maxEnergy,BS.energy);i++){const d=document.createElement('div');d.className='ep'+(i<BS.energy?' on':'');c.appendChild(d);}
}
function renderAtk(){document.getElementById('apips').innerHTML=Array.from({length:BS.maxAttacks}).map((_,i)=>`<span class="ap${i<BS.attacksLeft?' on':''}"></span>`).join('');}
function updateHp(){
  const p=BS.player,pp=Math.max(0,p.hp/p.maxHp*100);
  const pb=document.getElementById('p-hp-bar');if(pb){pb.style.width=pp+'%';pb.style.background=pp>50?'#22c55e':pp>25?'#eab308':'#ef4444';}
  const pt=document.getElementById('p-hp-txt');if(pt)pt.textContent=p.hp+'/'+p.maxHp;
  BS.enemies.forEach((e,i)=>{
    const ep=Math.max(0,e.hp/e.maxHp*100),eb=document.getElementById('ehb'+i),et=document.getElementById('eht'+i);
    if(eb){eb.style.width=ep+'%';eb.style.background=ep>50?'#22c55e':ep>25?'#eab308':'#ef4444';}
    if(et)et.textContent=e.hp+'/'+e.maxHp;
  });
}
function renderFusion(){
  for(let i=0;i<3;i++){const fp=document.getElementById('fp'+i);if(fp)fp.className='fp'+(i<BS.fusionStreak?' on':'');}
  const tt=document.getElementById('fm-turns'),rt=document.getElementById('fm-ready');
  if(BS.fusionTurns<3){if(tt)tt.textContent='Wait '+(3-BS.fusionTurns)+' more turns';if(rt)rt.style.display='none';}
  else{if(tt)tt.textContent='';if(rt)rt.style.display=BS.fusionReady?'block':'none';}
}

// ══════════════════════════════════════════════
//  COMBAT
// ══════════════════════════════════════════════
function useMove(id){
  if(BS.turn!=='player'||BS.attacksLeft<=0)return;
  const card=[...CARDS,...MASTERIES].find(c=>c.id===id);
  if(!card||card.type==='passive')return;
  if((BS.cooldowns[id]||0)>0)return;
  // Not enough energy — open math panel instead of silently failing
  if(BS.energy<card.energy){triggerMath('energy');return;}
  BS.energy-=card.energy;
  // After spending energy, if now at 0 and still have attacks left, do NOT end turn yet
  // — player can still answer a question. Decrement attacks normally.
  BS.attacksLeft--;
  if(card.type==='mastery')BS.cooldowns[id]=card.cd;
  const isAoe=(card.effect||'').startsWith('aoe');
  const targets=isAoe?BS.enemies.filter(e=>e.alive):[pickTarget()].filter(Boolean);
  targets.forEach(t=>{
    const base=card.dmg[0]+rng(card.dmg[1]-card.dmg[0]);
    const dmg=Math.max(0,base+(BS.passives.dmg_up?2:0));
    if(dmg>0)hitEnemy(t,dmg,card);
    if(card.effect==='stun')applyFx(t,'stun',1);
    if(card.effect==='blind'||card.effect==='aoe_blind')applyFx(t,'blind',1);
    if(card.effect==='slow')applyFx(t,'slow',1);
    if(card.effect==='freeze')applyFx(t,'freeze',2);
    if(card.effect==='aoe_poison')applyFx(t,'poison',3);
    if(card.effect==='aoe_burn')applyFx(t,'burn',2);
    if(card.effect==='double'){const d2=Math.max(0,base+(BS.passives.dmg_up?2:0));hitEnemy(t,d2,card);}
    if(card.effect==='block'){BS.blockNext=true;addLog('Bracing!','pa');}
  });
  setAnim('player','attack');setTimeout(()=>setAnim('player',BS.player.hp<BS.player.maxHp*.25?'hurt':'idle'),500);
  addLog('Used '+card.name+'!','pa');renderEnergy();renderAtk();renderMoves();updateHp();
  if(checkEnd())return;
  if(BS.attacksLeft<=0){
    setTimeout(endPTurn,700);
  } else if(BS.energy===0){
    // Attacks remain but no energy — auto-prompt math question
    setTimeout(()=>{if(BS.turn==='player'&&BS.energy===0&&BS.attacksLeft>0)triggerMath('energy');},420);
  }
}
function hitEnemy(en,dmg,card){

function applyFx(t,fx,turns){t.statusEffects=t.statusEffects||[];if(!t.statusEffects.find(s=>s.fx===fx))t.statusEffects.push({fx,turns});}
function endPTurn(){
  if(BS.turn!=='player')return;BS.turn='enemy';setTurBanner('ENEMY TURN');
  Object.keys(BS.cooldowns).forEach(id=>BS.cooldowns[id]=Math.max(0,BS.cooldowns[id]-1));
  if(BS.isVoid&&!BS.fusionUsed){
    BS.fusionTurns++;if(BS.fusionTurns>=3&&!BS.fusionReady){BS.fusionReady=true;addLog('✦ FUSION UNLOCKED! ✦','sy');}
    renderFusion();renderMoves();
  }
  const alive=BS.enemies.filter(e=>e.alive);let d=500;
  alive.forEach(e=>{setTimeout(()=>enemyAct(e),d);d+=900;});
  setTimeout(startPTurn,d+300);
}
function startPTurn(){
  if(checkEnd())return;
  BS.turn='player';
  BS.attacksLeft=BS.maxAttacks;
  // Energy resets to 0 each turn — must answer a math question to restore it.
  // Energy Drink passive grants 1 free energy pip at turn start.
  BS.energy=BS.passives.energy_up?1:0;
  // Tick DoT effects
  BS.enemies.filter(e=>e.alive).forEach(e=>{
    e.statusEffects=(e.statusEffects||[]).filter(s=>{
      if(s.fx==='poison'||s.fx==='burn'){const d=s.fx==='burn'?3:2;e.hp=Math.max(0,e.hp-d);dmgNum(d,'ew'+e.id,'#ff8800');addLog(e.name+' takes '+d+' '+s.fx+'!','sy');if(e.hp<=0){killEnemy(e);return false;}}
      s.turns--;return s.turns>0;
    });
  });
  setTurBanner('YOUR TURN');renderEnergy();renderAtk();updateHp();
  if(checkEnd())return;
  // Auto-prompt math to restore energy at the start of every turn (unless Energy Drink gave a free pip that covers all moves)
  if(BS.energy===0){
    // Tiny delay so the "YOUR TURN" banner shows first
    setTimeout(()=>{ if(BS.turn==='player'&&BS.energy===0) triggerMath('energy'); },350);
  } else {
    renderMoves();
  }
}
function enemyAct(en){
  if(!en.alive||BS.player.hp<=0)return;
  const fx=en.statusEffects?.find(s=>s.fx==='stun'||s.fx==='freeze');
  if(fx){fx.turns--;if(fx.turns<=0)en.statusEffects=en.statusEffects.filter(s=>s!==fx);addLog(en.name+' is '+fx.fx+'ed!','sy');return;}
  const raw=en.atk[0]+rng(en.atk[1]-en.atk[0]);
  if(BS.passives.dodge&&Math.random()<.2){addLog('You dodged!','pa');return;}
  let dmg=raw;if(BS.passives.armor)dmg=Math.max(0,dmg-1);if(BS.blockNext){dmg=Math.max(0,dmg-4);BS.blockNext=false;}
  BS.player.hp=Math.max(0,BS.player.hp-dmg);
  dmgNum(dmg,'player-hud','#ff4757');setAnim('player','attack');
  setAnim('enemy'+en.id,'attack');setTimeout(()=>setAnim('enemy'+en.id,'idle'),500);
  setTimeout(()=>{setAnim('player',BS.player.hp>0?(BS.player.hp<BS.player.maxHp*.25?'hurt':'idle'):'dead');},500);
  addLog(en.name+' hit you for '+dmg+'!','ea');updateHp();checkEnd();
}
function checkEnd(){
  if(BS.player.hp<=0){setTimeout(()=>showResult(false),900);return true;}
  if(BS.enemies.every(e=>!e.alive)){setTimeout(()=>showResult(true),900);return true;}
  return false;
}

//  BATTLE MUSIC ENGINE
// ══════════════════════════════════════════════
let battleAudioCtx=null,battleSource=null,battleGain=null;
let battleDistortion=null,battleFilter=null,battleMusicEnabled=true;

function initBattleAudio(){
  if(battleAudioCtx)return;
  battleAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  battleDistortion=battleAudioCtx.createWaveShaper();
  battleDistortion.curve=makeBattleDistCurve(0);
  battleFilter=battleAudioCtx.createBiquadFilter();
  battleFilter.type='lowpass';battleFilter.frequency.value=20000;
  battleDistortion.connect(battleFilter);battleFilter.connect(battleAudioCtx.destination);
}
function makeBattleDistCurve(amt){
  const n=256,c=new Float32Array(n);
  for(let i=0;i<n;i++){const x=(i*2/n)-1;c[i]=amt>0?(Math.PI+amt)*x/(Math.PI+amt*Math.abs(x)):x;}
  return c;
}
async function playBattleMusic(src){
  if(!battleMusicEnabled||!src)return;
  initBattleAudio();
  if(battleSource){try{battleSource.stop();}catch(e){}battleSource=null;}
  try{
    const res=await fetch(src);
    const buf=await res.arrayBuffer();
    const dec=await battleAudioCtx.decodeAudioData(buf);
    battleSource=battleAudioCtx.createBufferSource();
    battleSource.buffer=dec;battleSource.loop=true;
    battleGain=battleAudioCtx.createGain();battleGain.gain.value=0.55;
    battleSource.connect(battleGain);battleGain.connect(battleDistortion);
    battleSource.start(0);
  }catch(e){console.warn('Battle audio fail:',src,e);}
}
function stopBattleMusic(){
  if(battleSource){try{battleSource.stop();}catch(e){}battleSource=null;}
}
function setBattleLowHp(low){
  if(!battleDistortion)return;
  if(low){
    battleDistortion.curve=makeBattleDistCurve(220);
    battleFilter.frequency.setTargetAtTime(1100,battleAudioCtx.currentTime,0.4);
    if(battleGain)battleGain.gain.setTargetAtTime(0.68,battleAudioCtx.currentTime,0.3);
  } else {
    battleDistortion.curve=makeBattleDistCurve(0);
    battleFilter.frequency.setTargetAtTime(20000,battleAudioCtx.currentTime,0.4);
    if(battleGain)battleGain.gain.setTargetAtTime(0.55,battleAudioCtx.currentTime,0.3);
  }
}

    if(cfg.battleId && window.QA && QA.session){

    }

    // Play music after first user interaction

// ══════════════════════════════════════════════
//  MULTIPLAYER SYNC
// ══════════════════════════════════════════════
function setupMultiplayerSync(battleId, partySize){
  if(!window.QA || !QA.session) return;

  // Show who's in this battle
  QA.battle._sub(battleId);
  QA.battle.onChange(b => {
    if(!b) return;
    // Update turn banner to show whose turn it is
    const whose = QA.battle.whoseTurn(b);
    if(b.phase === 'player'){
      if(whose){
        const isMe = whose.username === QA.session.username;
        setTurBanner(isMe ? 'YOUR TURN' : (whose.username.toUpperCase().slice(0,8)+"'S TURN"));
        // Disable/enable cards based on whose turn it is
        BS.turn = isMe ? 'player' : 'waiting';
        renderMoves();
      }
    } else if(b.phase === 'enemy'){
      setTurBanner('ENEMY TURN');
      BS.turn = 'enemy';
    } else if(b.phase === 'result'){
      // Battle ended remotely
      if(b.winner === 'players'){
        QA.battle.applyRewards(battleId);
        setTimeout(()=>doVictory(b.rewards), 400);
      } else {
        setTimeout(()=>doDefeat(), 400);
      }
    }
    // Sync enemy HP from server state
    if(b.enemies){
      b.enemies.forEach((se, i)=>{
        const local = BS.enemies[i];
        if(local && se.hp !== undefined) local.hp = se.hp;
        if(local && se.hp <= 0 && local.alive){
          local.alive = false;
          const ew = document.getElementById('ew'+i);
          if(ew) ew.style.opacity='0.3';
        }
      });
      updateHp();
    }
    // Sync participant HP
    if(b.participants){
      const me = b.participants.find(p=>p.username===QA.session.username);
      if(me && BS.player) { BS.player.hp = me.hp; updateHp(); }
    }
  });

  // Override endPTurn for multiplayer: submit action to Supabase, wait for server
  const _origEndPTurn = endPTurn;
  endPTurn = async function(){
    if(BS.config?.battleId && window.QA && QA.session){
      BS.turn = 'waiting';
      setTurBanner('WAITING...');
      renderMoves();
      await QA.battle.submitAction(BS.config.battleId, {
        action: 'end_turn',
        newHp: BS.player.hp,
      });
      // Enemy phase is handled by leader only (first participant)
      const b = QA.battle.get();
      if(b && b.phase === 'enemy'){
        const amLeader = b.participants?.[0]?.username === QA.session.username;
        if(amLeader){
          // Run enemy AI then push results
          setTimeout(async ()=>{
            _origEndPTurn.call(this);
            // After enemy AI resolves, push new state
            setTimeout(async ()=>{
              await QA.battle.resolveEnemyPhase(
                BS.config.battleId,
                b.participants.map(p=>{
                  const local = BS.enemies; // enemies updated locally
                  return {...p, hp: p.username===QA.session.username ? BS.player.hp : p.hp};
                }),
                BS.enemies.map(e=>({...e, hp:e.hp, alive:e.alive}))
              );
            }, 1500);
          }, 300);
        }
      }
    } else {
      _origEndPTurn();
    }
  };
}

function doVictory(rewards){ addLog('Victory!','sy'); }
function doDefeat(){ addLog('Defeated...','ea'); }
</script>

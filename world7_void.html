<script>
// ════════════════════════════
//  WORLD CONFIG
// ════════════════════════════
const WORLD_ID=7;
const IS_VOID=true;
const BOSS_Z=-28;
const BATTLE_CFG={'worldId':7,'isVoid':true,'bg':'linear-gradient(135deg,#000003 0%,#06001a 25%,#000810 50%,#120002 75%,#030016 100%)','gnd':'linear-gradient(180deg,rgba(80,0,160,.3),rgba(0,0,0,.9))','gline':'rgba(255,0,255,.55)','battleMusic':'ost_void.mp3'};

// ════════════════════════════
//  STORAGE  (bridges QA session + localStorage)
// ════════════════════════════
function getUser(){
  if(window.QA&&QA.session) return QA.session;
  const n=localStorage.getItem('qa_session');if(!n)return null;
  return JSON.parse(localStorage.getItem('qa_users')||'{}')[n]||null;
}
function saveUser(u){
  if(window.QA&&QA.session) QA.savePlayer({gold:u.gold,xp:u.xp,level:u.level,hp:u.hp}).catch(()=>{});
  const us=JSON.parse(localStorage.getItem('qa_users')||'{}');us[u.username]=u;localStorage.setItem('qa_users',JSON.stringify(us));
}
function getProgress(){return JSON.parse(localStorage.getItem('qa_progress')||'{}');}
function saveProgress(p){localStorage.setItem('qa_progress',JSON.stringify(p));}
function hasItem(id){return (getProgress().items||[]).includes(id);}
function giveItem(id){const p=getProgress();p.items=p.items||[];if(!p.items.includes(id))p.items.push(id);saveProgress(p);}
function goBack(){if(window.QA) QA.presence.leave(); window.location.href='SpawnZone.html';}

// ════════════════════════════
//  AUDIO
// ════════════════════════════
let audioCtx=null,currentSource=null,currentGain=null,distortionNode=null,filterNode=null;
let musicEnabled=true,isLowHp=false;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  distortionNode=audioCtx.createWaveShaper();
  distortionNode.curve=makeDistCurve(0);
  filterNode=audioCtx.createBiquadFilter();
  filterNode.type='lowpass';filterNode.frequency.value=20000;
  distortionNode.connect(filterNode);filterNode.connect(audioCtx.destination);
}
function makeDistCurve(amt){
  const n=256,c=new Float32Array(n);
  for(let i=0;i<n;i++){const x=(i*2/n)-1;c[i]=amt>0?(Math.PI+amt)*x/(Math.PI+amt*Math.abs(x)):x;}
  return c;
}
async function playMusic(src,loop=true){
  if(!musicEnabled)return;
  initAudio();
  if(currentSource){try{currentSource.stop();}catch(e){}currentSource=null;}
  try{
    const res=await fetch(src);
    const buf=await res.arrayBuffer();
    const dec=await audioCtx.decodeAudioData(buf);
    currentSource=audioCtx.createBufferSource();
    currentSource.buffer=dec;currentSource.loop=loop;
    currentGain=audioCtx.createGain();currentGain.gain.value=0.52;
    currentSource.connect(currentGain);currentGain.connect(distortionNode);
    currentSource.start(0);
  }catch(e){console.warn('Audio fail:',src,e);}
}
function setLowHpMode(low){
  if(low===isLowHp)return;isLowHp=low;
  if(!distortionNode)return;
  if(low){distortionNode.curve=makeDistCurve(220);filterNode.frequency.setTargetAtTime(1000,audioCtx.currentTime,0.4);if(currentGain)currentGain.gain.setTargetAtTime(0.65,audioCtx.currentTime,0.3);}
  else{distortionNode.curve=makeDistCurve(0);filterNode.frequency.setTargetAtTime(20000,audioCtx.currentTime,0.4);if(currentGain)currentGain.gain.setTargetAtTime(0.52,audioCtx.currentTime,0.3);}
}
function toggleMusic(){
  musicEnabled=!musicEnabled;
  document.getElementById('music-btn').textContent='♪ '+(musicEnabled?'ON':'OFF');
  if(musicEnabled){playMusic('ost_void.mp3');}
  else if(currentSource){try{currentSource.stop();}catch(e){}}
}


// ════════════════════════════
//  SCENE
// ════════════════════════════
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setClearColor(0x000003);
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x030008,10,50);
const camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,.1,200);
camera.position.set(0,14,18);camera.lookAt(0,0,0);
const sun=new THREE.DirectionalLight(0xff00ff,1.2);
sun.position.set(10,20,8);sun.castShadow=true;
sun.shadow.mapSize.width=1024;sun.shadow.mapSize.height=1024;
sun.shadow.camera.near=.5;sun.shadow.camera.far=80;
sun.shadow.camera.left=-30;sun.shadow.camera.right=30;sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;
scene.add(sun);scene.add(new THREE.AmbientLight(0x050008,0.9));
const gGeo=new THREE.PlaneGeometry(100,100,30,30);
const gPos=gGeo.attributes.position;
for(let i=0;i<gPos.count;i++){const x=gPos.getX(i),z=gPos.getZ(i);gPos.setY(i,Math.sin(x*.25+z*.18)*.3+Math.cos(x*.18-z*.22)*.25);}
gGeo.computeVertexNormals();
const ground=new THREE.Mesh(gGeo,new THREE.MeshLambertMaterial({color:0x0a000a}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
const pathM=new THREE.Mesh(new THREE.PlaneGeometry(3.5,88),new THREE.MeshLambertMaterial({color:0x220033}));
pathM.rotation.x=-Math.PI/2;pathM.position.y=.02;scene.add(pathM);

// ── Decorations ──

const vP=[],vC=[];
function addPortal(x,z,c){const r=new THREE.Mesh(new THREE.TorusGeometry(1.5,.15,8,20),new THREE.MeshLambertMaterial({color:c,emissive:new THREE.Color(c),emissiveIntensity:.8}));r.position.set(x,1.5,z);r.rotation.x=Math.PI/8;scene.add(r);const inn=new THREE.Mesh(new THREE.CircleGeometry(1.35,16),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.2,side:THREE.DoubleSide}));inn.position.set(x,1.5,z);inn.rotation.x=Math.PI/8;scene.add(inn);const gl=new THREE.PointLight(c,.6,6);gl.position.set(x,1.5,z);scene.add(gl);vP.push({r,gl});}
[[8,3,0xff00ff],[8,-4,0x00ffff],[-8,5,0xff00ff],[-10,-3,0x00ffff],[5,12,0xff8800],[-5,10,0x00ff88]].forEach(([x,z,c])=>addPortal(x,z,c));
for(let i=0;i<8;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(.4+Math.random()*.5,.4+Math.random()*.5,.4+Math.random()*.5),new THREE.MeshLambertMaterial({color:0x220044,wireframe:Math.random()>.5}));m.position.set((Math.random()-.5)*28,1+Math.random()*4,(Math.random()-.5)*28);m.userData.fo=Math.random()*Math.PI*2;scene.add(m);vC.push(m);}

// ── Boss Gate ──
const vM=new THREE.MeshLambertMaterial({color:0x1a0030,emissive:new THREE.Color(0x0a0018),emissiveIntensity:.4});
[-2.5,2.5].forEach((x,i)=>{const p=new THREE.Mesh(new THREE.OctahedronGeometry(1.5,0),vM);p.position.set(x,3,BOSS_Z);p.castShadow=true;scene.add(p);const _pl=new THREE.PointLight(i===0?0xff00ff:0x00ffff,1.0,6);_pl.position.set(x,3,BOSS_Z);scene.add(_pl);});
const vr=new THREE.Mesh(new THREE.TorusGeometry(4,.25,10,24),new THREE.MeshLambertMaterial({color:0xff00ff,emissive:new THREE.Color(0x880088),emissiveIntensity:.7}));vr.rotation.x=Math.PI/2;vr.position.set(0,.1,BOSS_Z);scene.add(vr);
const bossGl=new THREE.PointLight(0xaa00ff,.9,8);bossGl.position.set(0,4,BOSS_Z);scene.add(bossGl);
const mbRing=new THREE.Mesh(new THREE.TorusGeometry(3.8,.14,6,20),new THREE.MeshLambertMaterial({color:0xff8800}));
mbRing.rotation.x=Math.PI/2;mbRing.position.set(0,.08,-16);scene.add(mbRing);


// ── Hazard: voidrift at z=-18 ──
const HAZARD_Z = -18;
const HAZARD_ITEM = 'jetpack';
// Visual hazard mesh
(function(){
  const hColors = {'lavapit':0xff2200,'sinkhole':0x332200,'icegap':0x88ccff,'voidrift':0xff00ff,'trench':0x001122,'chasm':0x111111};
  const hc = hColors['voidrift'] || 0xff2200;
  const hgeo = new THREE.PlaneGeometry(3.2,2.5);
  const hmat = new THREE.MeshLambertMaterial({color:hc,emissive:new THREE.Color(hc),emissiveIntensity:.4,transparent:true,opacity:.7});
  const hm = new THREE.Mesh(hgeo,hmat);
  hm.rotation.x=-Math.PI/2; hm.position.set(0,.03,HAZARD_Z); scene.add(hm);
  const hgl = new THREE.PointLight(hc,.8,5); hgl.position.set(0,.5,HAZARD_Z); scene.add(hgl);
  setInterval(()=>{ hgl.intensity=.5+Math.random()*.6; }, 120);
})();


// ── NPCs ──
function buildNPC(x,z,bc,hc){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(.5,.7,.4),new THREE.MeshLambertMaterial({color:bc}));body.position.y=.65;g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(.28,8,8),new THREE.MeshLambertMaterial({color:0xf0c070}));head.position.y=1.22;g.add(head);
  const hat=new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.12,8),new THREE.MeshLambertMaterial({color:hc}));hat.position.y=1.45;g.add(hat);
  const qm=new THREE.Mesh(new THREE.SphereGeometry(.12,6,6),new THREE.MeshLambertMaterial({color:0xffd700,emissive:new THREE.Color(0xffd700),emissiveIntensity:.6}));qm.position.y=1.85;g.add(qm);
  g.position.set(x,0,z);scene.add(g);return g;
}
const npc1M=buildNPC(5,4,0x8800cc,0x440088);
const npc2M=buildNPC(-5,-7,0x330055,0x1a0033);
const NPCS=[
  {mesh:npc1M,x:5,z:4,name:"VOID REMNANT",lines:["I was a traveler once. I came here to stop The Wanderer.", "I failed. Now I exist as an echo in the Void.", "The Wanderer doesn't think. It only consumes. Endlessly.", "Use the Elemental Fusion ability. It's the only thing that can hurt it."],gives:"",itemJS:``},
  {mesh:npc2M,x:-5,z:-7,name:"NULL ENTITY",lines:["...you're still real. I can barely remember what that felt like.", "The Wanderer took my world first. World 0. Before even yours existed.", "Every world it consumes makes it stronger. You're the first to reach World 8.", "The others tried. The Void still holds their echoes. Don't join us."],gives:"",itemJS:""},
];

function spawnRoamers(){
  ROAM_DEFS.forEach((rd,i)=>{

      waitT:Math.random()*2,alerted:false,data:tmpl,alive:true});

function updateRoamers(dt){
  roamers.forEach(r=>{
    if(!r.alive)return;
    const dx=pp.x-r.pos.x,dz=pp.z-r.pos.z,dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<5){r.alerted=true;r.target={x:pp.x,z:pp.z};}
    if(!r.alerted){
      r.waitT-=dt;
      if(r.waitT<=0){r.target={x:r.pos.x+(Math.random()-.5)*5,z:r.pos.z+(Math.random()-.5)*5};r.waitT=1.5+Math.random()*2.5;}
    }
    const tdx=r.target.x-r.pos.x,tdz=r.target.z-r.pos.z,td=Math.sqrt(tdx*tdx+tdz*tdz);
    const spd=r.alerted?.065:.022;
    if(td>.25){r.pos.x+=tdx/td*spd;r.pos.z+=tdz/td*spd;}
    r.mesh.position.set(r.pos.x,.48+Math.sin(t*3+r.pos.x)*.07,r.pos.z);
    r.eye.position.set(r.pos.x,.52+Math.sin(t*3+r.pos.x)*.07,r.pos.z);
    // Alerted: flash red briefly
    if(r.alerted){r.mesh.material.emissiveIntensity=.4+Math.sin(t*8)*.2;}
    // Collision
    if(dist<1.0&&!dlgLock&&!csActive){
      r.alive=false;r.mesh.visible=false;r.eye.visible=false;
      launchBattle([r.data],{gold:(r.data.gold||5)+rng(4),xp:4},null,false);
    }
  });
}

const ztip=document.getElementById('ztip');
function checkProximity(){
  // Zones
  let cl=null,cd=Infinity;
  ZONES.forEach(z=>{const dx=pp.x-z.x,dz=pp.z-z.z,d=Math.sqrt(dx*dx+dz*dz);if(d<3.0&&d<cd){cd=d;cl=z;}});
  if(cl!==activeZone){
    activeZone=cl;
    if(cl){ztip.style.display='block';document.getElementById('ztn').textContent=(cl.id==='boss'?'☠ ':cl.id==='mini'?'⚠ ':'')+cl.name;document.getElementById('zte').innerHTML=cl.enemies.map(e=>'• '+e.name+' (HP:'+e.maxHp+')').join('<br>');}
    else ztip.style.display='none';
  }
  if(activeZone){
    const v=new THREE.Vector3(activeZone.x,2,activeZone.z);v.project(camera);
    ztip.style.left=Math.min((v.x*.5+.5)*window.innerWidth+20,window.innerWidth-240)+'px';
    ztip.style.top=Math.max((-.5*v.y+.5)*window.innerHeight-88,8)+'px';
  }
  // NPCs
  let cn=null;
  NPCS.forEach(n=>{const dx=pp.x-n.x,dz=pp.z-n.z,d=Math.sqrt(dx*dx+dz*dz);if(d<2.8)cn=n;});
  activeNpc=cn;
  const nt=document.getElementById('npc-tip');
  if(cn){nt.style.display='block';nt.textContent='[F] '+cn.name;
    const v=new THREE.Vector3(cn.x,2,cn.z);v.project(camera);
    nt.style.left=Math.min((v.x*.5+.5)*window.innerWidth+10,window.innerWidth-200)+'px';
    nt.style.top=Math.max((-.5*v.y+.5)*window.innerHeight-55,8)+'px';
  }else nt.style.display='none';
}

let t=0,lastT=Date.now();
function animate(){
  requestAnimationFrame(animate);
  if(csActive)return;
  const now=Date.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;t+=dt;

  if(!dlgLock&&!csActive){
    const spd=0.12;
    // Dash
    if(dashT>0){dashT-=dt;const ds=0.52;if(dashDir==='w'||dashDir==='ArrowUp')pp.z-=ds;if(dashDir==='s'||dashDir==='ArrowDown')pp.z+=ds;if(dashDir==='a'||dashDir==='ArrowLeft')pp.x+=ds;if(dashDir==='d'||dashDir==='ArrowRight')pp.x-=ds;}
    else{if(keys['w']||keys['ArrowUp'])pp.z-=spd;if(keys['s']||keys['ArrowDown'])pp.z+=spd;if(keys['a']||keys['ArrowLeft'])pp.x+=spd;if(keys['d']||keys['ArrowRight'])pp.x-=spd;}
    pp.x=Math.max(-24,Math.min(24,pp.x));
    pp.z=Math.max(-34,Math.min(14,pp.z));
    // Dash cd
    if(dashCd>0){dashCd-=dt;if(dashCd<=0){dashCd=0;document.getElementById('dash-cd').style.display='none';}else document.getElementById('dash-cd').textContent='DASH: '+dashCd.toFixed(1)+'s';}
    // Jetpack
    jetActive=keys[' ']&&hasItem('jetpack');
    if(jetActive){ppY=Math.min(ppY+dt*3,2.5);document.getElementById('jet-ind').style.display='block';}
    else{ppY=Math.max(ppY-dt*4,0);document.getElementById('jet-ind').style.display='none';}
    
// Hazard block
if(Math.abs(pp.z - HAZARD_Z) < 1.5 && Math.abs(pp.x) < 2.2 && !hasItem(HAZARD_ITEM)){
  pp.z = pp.z < HAZARD_Z ? HAZARD_Z+1.6 : HAZARD_Z-1.6;
  const hw=document.getElementById('hazard-warn');hw.style.display='block';
  clearTimeout(window._hwt);window._hwt=setTimeout(()=>hw.style.display='none',2200);
}
    updateRoamers(dt);
    checkProximity();
  }

  NPCS.forEach((n,i)=>{n.mesh.position.y=Math.sin(t*1.4+i)*.07;});
  pMark.position.set(pp.x,.04+ppY+Math.sin(t*3)*.03,pp.z);
  pLight.position.copy(pMark.position);
  camera.position.x+=(pp.x-camera.position.x)*.06;
  camera.position.z+=(pp.z+16-camera.position.z)*.06;
  camera.lookAt(pp.x,0,pp.z);
  zMarkers.forEach((zm,i)=>{zm.orb.position.y=2.1+Math.sin(t*2+i)*.1;zm.pl.intensity=.5+Math.sin(t*3+i)*.18;});
  bossGl.intensity=.7+Math.sin(t*2)*.28;
  vP.forEach((p,i)=>{p.r.rotation.z=t*.4+i;p.gl.intensity=.5+Math.sin(t*3+i)*.3;});vC.forEach((c,i)=>{c.position.y=1.5+Math.sin(t*1.2+c.userData.fo)*1.2;c.rotation.y=t*.5+i;c.rotation.x=t*.3;});
  updateOtherPlayers(t);
  if(window.QA&&QA.session) QA.presence.setPos(pp.x,pp.z);

}

const otherMeshes={};   // username → {body, label, smoke}
const smokeParticles=[];  // {mesh, life, maxLife}
let joinPrompt=null;       // current battle_id we can E-to-join

function ensureOtherMesh(username,col){
  if(otherMeshes[username]) return otherMeshes[username];
  const hue=col||'#4488ff';
  const cInt=parseInt(hue.replace(/[^0-9a-f]/gi,'').padEnd(6,'0').slice(0,6),16)||0x4488ff;
  const mat=new THREE.MeshLambertMaterial({color:cInt,emissive:new THREE.Color(cInt),emissiveIntensity:.45});
  const body=new THREE.Mesh(new THREE.CylinderGeometry(.22,.22,.06,8),mat);
  scene.add(body);
  // DOM username label
  const owner=localStorage.getItem('qa_owner');
  const isOwner=(owner&&username===owner);
  const lbl=document.createElement('div');
  lbl.className='player-label'+(isOwner?' owner-label':'');
  lbl.textContent=(isOwner?'👑 ':'')+username.toUpperCase().slice(0,10);
  document.body.appendChild(lbl);
  otherMeshes[username]={body,lbl,col:hue,smoke:[],battleId:null,activity:'idle',px:0,pz:8};
  return otherMeshes[username];
}

function updateOtherPlayers(t){
  const others=window._otherPlayers||{};
  // Remove stale
  Object.keys(otherMeshes).forEach(u=>{
    if(!others[u]){
      scene.remove(otherMeshes[u].body);
      if(otherMeshes[u].lbl) otherMeshes[u].lbl.remove();
      delete otherMeshes[u];
    }
  });
  // Update / add
  Object.values(others).forEach(r=>{
    const om=ensureOtherMesh(r.username, r.avatar_col||'#4488ff');
    om.px=r.pos_x||0; om.pz=r.pos_z||8;
    om.activity=r.activity||'idle';
    om.battleId=r.battle_id||null;
    om.body.position.set(om.px,.04+Math.sin(t*2+om.px)*.04,om.pz);
    // Project 3D position to screen for label
    const pos3=new THREE.Vector3(om.px,.8,om.pz);
    pos3.project(camera);
    const sx=(pos3.x*.5+.5)*window.innerWidth;
    const sy=(-.5*pos3.y+.5)*window.innerHeight;
    if(pos3.z<1){
      om.lbl.style.display='block';
      om.lbl.style.left=sx+'px';
      om.lbl.style.top=(sy-22)+'px';
    }else{om.lbl.style.display='none';}
    // Smoke when in-battle
    if(om.activity==='in-battle' && Math.random()<.08){
      const sm=new THREE.Mesh(new THREE.SphereGeometry(.12+Math.random()*.1,5,5),
        new THREE.MeshBasicMaterial({color:0xcccccc,transparent:true,opacity:.5}));
      sm.position.set(om.px+(Math.random()-.5)*.5,.5+Math.random()*.8,om.pz+(Math.random()-.5)*.5);
      scene.add(sm);
      smokeParticles.push({mesh:sm,life:0,maxLife:1.2+Math.random()*.8,vx:(Math.random()-.5)*.02,vz:(Math.random()-.5)*.02});
    }
  });
  // Animate smoke
  for(let i=smokeParticles.length-1;i>=0;i--){
    const s=smokeParticles[i];s.life+=0.016;
    const prog=s.life/s.maxLife;
    s.mesh.position.y+=0.025;s.mesh.position.x+=s.vx;s.mesh.position.z+=s.vz;
    s.mesh.material.opacity=0.5*(1-prog);
    s.mesh.scale.setScalar(1+prog*.8);
    if(s.life>=s.maxLife){scene.remove(s.mesh);smokeParticles.splice(i,1);}
  }
  // E-to-join proximity check
  let nearBattle=null;
  Object.values(others).forEach(r=>{
    if(r.activity==='in-battle'&&r.battle_id){
      const dx=pp.x-r.pos_x,dz=pp.z-r.pos_z;
      if(Math.sqrt(dx*dx+dz*dz)<3.5) nearBattle=r.battle_id;
    }
  });
  const jp=document.getElementById('join-prompt');
  if(nearBattle&&!dlgLock&&!csActive){joinPrompt=nearBattle;jp.style.display='block';}
  else{joinPrompt=null;jp.style.display='none';}
}

function drawMMWithOthers(){
  const mm=document.getElementById('mmc');
  const mc2=mm.getContext('2d');
  mc2.fillStyle='#050205';mc2.fillRect(0,0,110,110);
  mc2.fillStyle='rgba(255,255,255,.05)';mc2.fillRect(5,5,100,100);
  mc2.fillStyle='rgba(255,255,255,.07)';mc2.fillRect(52,5,6,100);
  ZONES.forEach(z=>{const mx=55+z.x*1.5,mz=55+z.z*1.5;mc2.fillStyle=z.id==='boss'?'#ff3333':z.id==='mini'?'#ff8800':'#ff00ff';mc2.beginPath();mc2.arc(mx,mz,3.5,0,Math.PI*2);mc2.fill();});
  roamers.forEach(r=>{if(!r.alive)return;const mx=55+r.pos.x*1.5,mz=55+r.pos.z*1.5;mc2.fillStyle=r.alerted?'#ff4444':'#aa2222';mc2.beginPath();mc2.arc(mx,mz,2.5,0,Math.PI*2);mc2.fill();});
  NPCS.forEach(n=>{mc2.fillStyle='#ffd700';mc2.beginPath();mc2.arc(55+n.x*1.5,55+n.z*1.5,3,0,Math.PI*2);mc2.fill();});
  // Other players
  Object.values(window._otherPlayers||{}).forEach(r=>{
    mc2.fillStyle=r.avatar_col||'#4488ff';mc2.beginPath();mc2.arc(55+r.pos_x*1.5,55+r.pos_z*1.5,3,0,Math.PI*2);mc2.fill();
    if(r.activity==='in-battle'){mc2.strokeStyle='#fff';mc2.lineWidth=1.2;mc2.stroke();}
  });
  const px=55+pp.x*1.5,pz=55+pp.z*1.5;
  mc2.fillStyle='#00aaff';mc2.beginPath();mc2.arc(px,pz,3.5,0,Math.PI*2);mc2.fill();
  mc2.strokeStyle='#fff';mc2.lineWidth=1.2;mc2.stroke();
}

// Override the original drawMM with the one that includes other players
function drawMM() { drawMMWithOthers(); }

// E-to-join handler + T for chat
document.addEventListener('keydown',e=>{
  if(e.key==='e'||e.key==='E'){
    if(joinPrompt&&!dlgLock&&!csActive){
      QA.battle.joinWild(joinPrompt).then(r=>{

          const cfg={...BATTLE_CFG,enemies:r.data.enemies,rewards:r.data.rewards,battleId:r.data.id,isMultiplayer:true};
          sessionStorage.setItem('battleConfig',JSON.stringify(cfg));
          window.location.href='Battle.html';
        }

  }
});

const CHAT_MSGS = [
  {label:'Hello!', msg:'Hello!'},
  {label:'Goodbye!', msg:'Goodbye!'},
  {label:'Join my party!', msg:'Join my party!'},
  ...window._moveNames ? window._moveNames.map(m=>( {label:'I\'m using '+m, msg:'I\'m going to use '+m+'!'} )) : [],
];
let chatVisible=false;
function buildChatBubbles(){
  const CARDS=['Stab','Paper Toss','Eraser Block','Sticky Note','Ink Splash','Ruler Whip','Shield Page','Book Slam'];
  const moves=['Stab','Paper Toss','Eraser Block','Sticky Note','Ink Splash','Ruler Whip','Shield Page','Book Slam'];
  const fixed=[
    {label:'Hello!',      msg:'Hello!'},
    {label:'Goodbye!',    msg:'Goodbye!'},
    {label:'Join my party!', msg:'Join my party!'},
    {label:'GG!',         msg:'Good game!'},
    {label:'Watch out!',  msg:'Watch out!'},
  ];
  const moveOpts = moves.map(m=>( {label:'Using: '+m, msg:'I\'m going to use '+m+'!'} ));
  return [...fixed, ...moveOpts];
}

function openChat(){
  const existing=document.getElementById('chat-panel');
  if(existing){existing.remove();chatVisible=false;return;}
  chatVisible=true;
  const opts=buildChatBubbles();
  const panel=document.createElement('div');
  panel.id='chat-panel';
  panel.style.cssText='position:fixed;bottom:130px;left:50%;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,.95);border:2px solid #ff00ff;border-radius:6px;padding:10px;font-family:"Press Start 2P",monospace;min-width:240px;max-width:320px;';
  panel.innerHTML='<div style="font-size:6px;color:#ff00ff;margin-bottom:8px;text-align:center;">QUICK CHAT</div>';
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:5px;';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.textContent=o.label;
    b.style.cssText='font-family:"Press Start 2P",monospace;font-size:5px;padding:5px 4px;background:rgba(255,255,255,.06);border:1px solid #ff00ff;border-radius:3px;color:#ddd;cursor:pointer;text-align:left;';
    b.onclick=()=>{
      sendChat(o.msg);
      panel.remove();chatVisible=false;
    };
    grid.appendChild(b);
  });
  panel.appendChild(grid);
  document.body.appendChild(panel);
  // close on outside click
  setTimeout(()=>document.addEventListener('click',function _cc(e){if(!panel.contains(e.target)){panel.remove();chatVisible=false;document.removeEventListener('click',_cc);}}),50);
}

let _chatShown={};  // username→timeout
function sendChat(msg){
  const me=(window.QA&&QA.session)?QA.session.username:'YOU';
  showChatBubble(me, msg, true);
  // Push via presence activity field as cheap broadcast
  if(window.QA&&QA.session) QA.presence.setActivity('chat:'+encodeURIComponent(msg), null);
  setTimeout(()=>{if(window.QA&&QA.session) QA.presence.setActivity('idle',null);}, 3500);
}

function showChatBubble(username, msg, isMe){
  // Show floating bubble above player/other dot
  const id='cb_'+username.replace(/\W/g,'');
  const old=document.getElementById(id);if(old)old.remove();
  const d=document.createElement('div');
  d.id=id;
  d.style.cssText=`position:fixed;z-index:95;font-family:'Press Start 2P',monospace;font-size:6px;
    background:${isMe?'rgba(0,100,255,.92)':'rgba(40,40,40,.94)'};
    border:1.5px solid ${isMe?'#4af':'#888'};border-radius:5px;padding:5px 8px;
    color:#fff;max-width:160px;pointer-events:none;white-space:pre-wrap;line-height:1.7;
    animation:chatPop .2s ease;`;
  d.textContent=(isMe?'YOU':username.slice(0,8).toUpperCase())+': '+msg;
  document.body.appendChild(d);
  // Position: centre screen slightly above bottom for self, top for others
  d.style.bottom=isMe?'170px':'auto';
  d.style.top=isMe?'auto':'80px';
  d.style.left='50%';d.style.transform='translateX(-50%)';
  setTimeout(()=>d.remove(), 3500);
}

// Watch for incoming chat from other players via presence
function checkIncomingChats(others){
  Object.values(others).forEach(r=>{
    if(r.activity&&r.activity.startsWith('chat:')){
      const key=r.username+r.activity;
      if(_chatShown[key])return;
      _chatShown[key]=true;
      setTimeout(()=>delete _chatShown[key],4000);
      const msg=decodeURIComponent(r.activity.slice(5));
      showChatBubble(r.username, msg, false);
    }
  });
}

function openPartyPanel(){
  const existing=document.getElementById('party-panel');if(existing){existing.remove();return;}
  const party=window.QA?QA.party.get():null;
  const me=(window.QA&&QA.session)?QA.session.username:'(offline)';
  const panel=document.createElement('div');
  panel.id='party-panel';
  panel.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;background:#060a10;border:2px solid #ff00ff;border-radius:8px;padding:18px 22px;font-family:"Press Start 2P",monospace;min-width:280px;max-width:360px;box-shadow:0 0 30px rgba(0,0,0,.8);';
  let html='<div style="font-size:8px;color:#ff00ff;margin-bottom:14px;text-align:center;">⚔ PARTY</div>';
  if(!window.QA||!QA.session){
    html+='<div style="font-size:5px;color:#888;text-align:center;">Log in to use parties.</div>';
  } else if(!party){
    html+=`<div style="font-size:5px;color:#aaa;margin-bottom:12px;text-align:center;">You are not in a party.</div>
    <button onclick="QA.party.create().then(r=>{if(r.error)alert(r.error);else{document.getElementById('party-panel').remove();openPartyPanel();}})" 
      style="font-family:'Press Start 2P',monospace;font-size:6px;padding:7px 14px;background:#22c55e;border:none;color:#000;cursor:pointer;border-radius:3px;width:100%;margin-bottom:8px;">
      + CREATE PARTY</button>`;
  } else {
    html+=`<div style="font-size:5px;color:#888;margin-bottom:10px;">Leader: ${party.leader.toUpperCase()}</div>`;
    html+=`<div style="font-size:5px;color:#ff00ff;margin-bottom:6px;">MEMBERS (${party.members.length}/4)</div>`;
    party.members.forEach(m=>{
      html+=`<div style="font-size:5px;padding:4px 0;border-bottom:1px solid #222;color:#ddd;">
        ${m===party.leader?'👑 ':''}${m.toUpperCase().slice(0,12)}${m===me?' (YOU)':''}
        ${m!==me&&party.leader===me?`<button onclick="QA.party.kick('${m}').then(()=>{document.getElementById('party-panel').remove();openPartyPanel();})" style="float:right;font-family:'Press Start 2P',monospace;font-size:4px;padding:2px 5px;background:#ff3a3a;border:none;color:#fff;cursor:pointer;border-radius:2px;">KICK</button>`:''}</div>`;
    });
    if(party.members.length<4&&party.leader===me){
      html+=`<div style="margin-top:10px;display:flex;gap:6px;">
        <input id="invite-inp" placeholder="username" style="font-family:'Press Start 2P',monospace;font-size:5px;padding:5px;background:#111;border:1px solid #444;color:#fff;border-radius:3px;flex:1;"/>
        <button onclick="QA.party.invite(document.getElementById('invite-inp').value).then(r=>alert(r.error||'Invite sent!'))" 
          style="font-family:'Press Start 2P',monospace;font-size:5px;padding:5px 8px;background:#ff00ff;border:none;color:#000;cursor:pointer;border-radius:3px;">INVITE</button>
      </div>`;
    }
    html+=`<button onclick="QA.party.leave().then(()=>{document.getElementById('party-panel').remove();})" 
      style="font-family:'Press Start 2P',monospace;font-size:5px;padding:6px;background:#333;border:1px solid #555;color:#aaa;cursor:pointer;border-radius:3px;width:100%;margin-top:10px;">LEAVE PARTY</button>`;
  }
  html+='<button onclick="this.parentElement.remove()" style="position:absolute;top:8px;right:10px;background:none;border:none;color:#666;cursor:pointer;font-size:14px;">✕</button>';
  panel.innerHTML=html;
  document.body.appendChild(panel);
}

// ════════════════════════════
//  BOOT (QA session + presence)
// ════════════════════════════
window._otherPlayers={};

async function bootWorld(){
  // Start the game immediately — don't block on network
  animate();
  afterIntro();

  // Auth check: try QA session first
  let userData = null;
  if(window.QA){
    userData = await QA.restoreSession().catch(()=>null);
  }

  // Fall back: parse JSON session stored by SpawnZone
  if(!userData){
    try{
      const raw=localStorage.getItem('qa_session');
      if(raw) userData=JSON.parse(raw);
    }catch(e){}
  }

  if(!userData){
    // Not logged in at all
    window.location.href='SpawnZone.html'; return;
  }

  // Update HUD
  document.getElementById('pcn').textContent=(userData.username||'HERO').toUpperCase().slice(0,8);
  document.getElementById('pcg').textContent='💰 '+(userData.gold||0);

  // Multiplayer presence (background, non-blocking)
  if(window.QA&&QA.session){
    QA.presence.join(WORLD_ID).then(()=>{
      QA.presence.setPos(pp.x,pp.z);
      QA.presence.onUpdate(others=>{
        window._otherPlayers=others;
        checkIncomingChats(others);
      });
    }).catch(()=>{});
    QA.party.listenInvites();
    QA.party.onInvite(inv=>showInviteToast(inv));
    if(userData.party_id) QA.party.refresh();

    // Owner tag: first registered player
    _sb.from('players').select('username').order('created_at',{ascending:true}).limit(1).single()
      .then(r=>{ if(r.data) localStorage.setItem('qa_owner',r.data.username); }).catch(()=>{});
  }
}

function showInviteToast(inv){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:99;background:rgba(0,0,0,.92);border:2px solid #ffd700;border-radius:5px;padding:12px 18px;font-family:"Press Start 2P",monospace;font-size:6px;color:#ffd700;text-align:center;';
  d.innerHTML=`<div style="margin-bottom:8px;">Party invite from<br>${inv.from_user.toUpperCase()}</div>
    <button onclick="QA.party.accept('${inv.id}').then(r=>{if(r.error)alert(r.error);this.parentElement.parentElement.remove();})" 
      style="font-family:'Press Start 2P',monospace;font-size:5px;padding:4px 8px;background:#22c55e;border:none;color:#000;cursor:pointer;border-radius:2px;margin-right:6px;">ACCEPT</button>
    <button onclick="QA.party.decline('${inv.id}');this.parentElement.remove();" 
      style="font-family:'Press Start 2P',monospace;font-size:5px;padding:4px 8px;background:#444;border:none;color:#aaa;cursor:pointer;border-radius:2px;">DECLINE</button>`;
  document.body.appendChild(d);
  setTimeout(()=>d&&d.parentElement&&d.remove(),30000);
}

bootWorld();
